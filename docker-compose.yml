services:
  db:
    image: timescale/timescaledb-ha:pg15-latest
    container_name: portintel_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-portintel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portintel_secret}
      POSTGRES_DB: ${POSTGRES_DB:-portintel}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portintel -d portintel"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: portintel_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ais_consumer:
    build:
      context: ./ais_consumer
      dockerfile: Dockerfile
    container_name: portintel_ais
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-portintel}:${POSTGRES_PASSWORD:-portintel_secret}@db:5432/${POSTGRES_DB:-portintel}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  vessel_simulator:
    build:
      context: ./vessel_simulator
      dockerfile: Dockerfile
    container_name: portintel_simulator
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-portintel}:${POSTGRES_PASSWORD:-portintel_secret}@db:5432/${POSTGRES_DB:-portintel}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_worker:
    build:
      context: .
      dockerfile: celery_app/Dockerfile
    container_name: portintel_celery_worker
    command: celery -A celery_app.app worker --loglevel=info --concurrency=4
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-portintel}:${POSTGRES_PASSWORD:-portintel_secret}@db:5432/${POSTGRES_DB:-portintel}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_beat:
    build:
      context: .
      dockerfile: celery_app/Dockerfile
    container_name: portintel_celery_beat
    command: celery -A celery_app.app beat --loglevel=info --scheduler celery.beat.PersistentScheduler
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-portintel}:${POSTGRES_PASSWORD:-portintel_secret}@db:5432/${POSTGRES_DB:-portintel}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: portintel_api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-portintel}:${POSTGRES_PASSWORD:-portintel_secret}@db:5432/${POSTGRES_DB:-portintel}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: portintel_frontend
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
